<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSV2JSON</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <main class="app">
        <h1>CSV2JSON</h1>

        <p id="warning" class="warning" hidden></p>

        <div class="file-actions">
            <button id="open-csv-btn" type="button">Open CSV</button>
            <button id="save-csv-btn" type="button">Save CSV</button>
            <button id="open-json-btn" type="button">Open JSON</button>
            <button id="save-json-btn" type="button">Save JSON</button>
            <span id="file-status" class="file-status"></span>
        </div>

        <div class="converter">
            <div class="field">
                <label for="input-box">Input</label>
                <textarea id="input-box" placeholder="Paste JSON or CSV here..."></textarea>
            </div>

            <div class="actions-mid">
                <button id="to-csv-btn" type="button">To CSV &rarr;</button>
                <button id="to-json-btn" type="button">To JSON &rarr;</button>
            </div>

            <div class="field">
                <label for="output-box">Output</label>
                <textarea id="output-box" placeholder="Result will appear here..." readonly></textarea>
            </div>
        </div>

        <div class="actions">
            <button id="clear-btn" type="button">Clear</button>
        </div>
    </main>

    <script type="module" src="scripts/main.js"></script>
</body>

</html>
